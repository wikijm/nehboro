name: Build and Check Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Lint Extension
        run: |
          npx web-ext lint --source-dir . --output-format json > lint-results.json || true
          # Note: We use || true because we still want to package even if there are warnings, 
          # but the packager will fail on errors.
          cat lint-results.json

      - name: Package Extension
        run: |
          npx web-ext build --source-dir . --artifacts-dir ./dist --overwrite-dest
          # Rename the artifact for clarity if needed, though web-ext uses version from manifest
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: nehboro-extension
          path: ./dist/*.zip
