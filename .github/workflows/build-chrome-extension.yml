name: Build and Check Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Lint Extension
        run: |
          npx web-ext lint --source-dir . --output-format json > lint-results.json || true
          # Note: We use || true because we still want to package even if there are warnings, 
          # but the packager will fail on errors.
          cat lint-results.json

      - name: Package Extension
        run: |
          npx web-ext build --source-dir . --artifacts-dir ./dist --overwrite-dest --ignore-files "lint-results.json" "README.md" --filename nehboro.zip
          
      - name: Create CRX
        run: |
          # Use secret if available, otherwise generate a temporary key
          if [ -z "${{ secrets.CHROME_EXTENSION_PEM }}" ]; then
            echo "WARNING: CHROME_EXTENSION_PEM secret not found. Generating a temporary key."
            npx crx keygen .
            mv key.pem ./dist/key.pem
          else
            echo "${{ secrets.CHROME_EXTENSION_PEM }}" > ./dist/key.pem
          fi
          # Unzip to a temporary directory to pack into CRX
          unzip ./dist/nehboro.zip -d ./crx-temp
          npx crx pack ./crx-temp -p ./dist/key.pem -o ./dist/nehboro.crx
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: nehboro-extension
          path: ./dist/nehboro.*

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        shell: bash
        run: |
          if gh release view ${{ steps.version.outputs.tag }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: ./dist/*.crx
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    # Only run if it's a push to main/master AND the version was just released (or if manually triggered)
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged extension
        uses: actions/download-artifact@v8.0.1
        with:
          name: nehboro-extension
          path: ./dist

      - name: Upload to Chrome Web Store
        # Note: This step will be skipped if secrets are not set
        if: env.HAS_SECRETS == 'true'
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: ./dist/*.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        env:
          HAS_SECRETS: ${{ secrets.CHROME_EXTENSION_ID != '' && secrets.CHROME_CLIENT_ID != '' }}
